name: Antikraak Monitor

on:
  schedule:
    # Elke 5 minuten (in de praktijk vaak vertraagd door GitHub)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Hiermee kun je de workflow handmatig starten via de Actions-tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Stap 1: Code ophalen uit de main-branch
      - name: Code ophalen
        uses: actions/checkout@v4

      # Stap 2: Python installeren
      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Stap 3: Benodigde bibliotheken installeren
      - name: Bibliotheken installeren
        run: pip install -r requirements.txt

      # Stap 4: State ophalen uit de state-branch (als die bestaat)
      - name: State ophalen
        run: |
          # Probeer state-bestanden op te halen uit de state-branch
          git fetch origin state || echo "State-branch bestaat nog niet"
          if git rev-parse origin/state >/dev/null 2>&1; then
            # Haal alleen de state JSON-bestanden op uit de state-branch
            git checkout origin/state -- state_*.json 2>/dev/null || echo "Geen state-bestanden gevonden"
          else
            echo "Eerste run - geen bestaande state"
          fi

      # Stap 5: Monitor draaien
      - name: Monitor draaien
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      # Stap 6: State opslaan naar de state-branch
      - name: State opslaan
        run: |
          # Configureer git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Bewaar state-bestanden tijdelijk
          mkdir -p /tmp/state
          cp state_*.json /tmp/state/ 2>/dev/null || echo "Geen state-bestanden om op te slaan"

          # Wissel naar de state-branch (maak hem aan als hij niet bestaat)
          if git rev-parse origin/state >/dev/null 2>&1; then
            git checkout state
            git pull origin state
          else
            git checkout --orphan state
            git rm -rf . 2>/dev/null || true
          fi

          # Kopieer state-bestanden terug en commit
          cp /tmp/state/state_*.json . 2>/dev/null || echo "Geen state-bestanden"
          git add state_*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Geen wijzigingen in state"
          else
            git commit -m "State bijgewerkt $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin state
          fi

      # Stap 7: Vangnet - als de job crasht, stuur een Telegram-bericht
      - name: Crash-melding
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="🚨 <b>GitHub Actions job gecrasht!</b>%0A%0ADe antikraak-monitor kon niet draaien. Check de logs op GitHub."
